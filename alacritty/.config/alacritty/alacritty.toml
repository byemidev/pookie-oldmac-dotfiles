# Alacritty configuration migrated from pookie-dotfiles Ghostty config
# Theme: guts (custom dark theme)
# Font: Fira Code Regular
# Original: https://github.com/vossenwout/pookie-dotfiles

# ========== WINDOW ==========
[window]
decorations = "buttonless"
opacity = 1.0
padding = { x = 4, y = 4 }
dynamic_padding = true
option_as_alt = "OnlyLeft"
startup_mode = "Fullscreen"

# ========== FONT ==========
[font]
normal = { family = "Fira Code", style = "Regular" }
size = 13.0

# ========== COLORS (guts theme) ==========
[colors.primary]
background = "#101113"
foreground = "#9f9e99"

[colors.cursor]
text = "#101113"
cursor = "#9f9e99"

[colors.selection]
text = "#e1ffe5"
background = "#4a4253"

[colors.normal]
black = "#101113"
red = "#93554b"
green = "#51606a"
yellow = "#ac7f7b"
blue = "#697a9a"
magenta = "#83799C"
cyan = "#7a837c"
white = "#9f9e99"

[colors.bright]
black = "#4a4253"
red = "#93554b"
green = "#a7d8b0"
yellow = "#e1ffe5"
blue = "#8288A0"
magenta = "#997e95"
cyan = "#879493"
white = "#A8A7A2"

# ========== CURSOR ==========
[cursor]
style = { shape = "Block", blinking = "Off" }

# ========== MOUSE ==========
[mouse]
hide_when_typing = true

# ========== KEYBOARD (tmux navigation) ==========

[[keyboard.bindings]]
key = "H"
mods = "Alt"
chars = "\u001bh"

[[keyboard.bindings]]
key = "J"
mods = "Alt"
chars = "\u001bj"

[[keyboard.bindings]]
key = "K"
mods = "Alt"
chars = "\u001bk"

[[keyboard.bindings]]
key = "L"
mods = "Alt"
chars = "\u001bl"

[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\u001b[1;3D"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\u001b[1;3C"

[[keyboard.bindings]]
key = "Up"
mods = "Alt"
chars = "\u001b[1;3A"

[[keyboard.bindings]]
key = "Down"
mods = "Alt"
chars = "\u001b[1;3B"

[[keyboard.bindings]]
key = "LBracket"
mods = "Control"
chars = "\u001b"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

# ========== TERMINAL SHELL (new syntax) ==========
[terminal]
shell = { program = "/usr/local/bin/zsh", args = ["-l"] }

# ========== SCROLLING ==========
[scrolling]
history = 5000
multiplier = 2
